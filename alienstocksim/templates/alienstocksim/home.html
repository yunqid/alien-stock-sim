<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        {% load static %}
        <link href="{% static 'alienstocksim/home.css' %}" rel="stylesheet" type="text/css">
        <title> Home </title>
    </head>
    <body>
        <header class="breaking_news_section">
            <div class="breaking_news_top">
                <div class="scrolling_container">
                    <div class="scrolling_text">
                        BREAKING NEWS: THIS IS THE HOME PAGE!
                    </div>
                </div>
            </div>
            <nav class="top_nav">
                <a href="{% url 'profile' %}" class="profile_tab">Profile</a>
            </nav>
        </header>
        <div class="home_layout">
            <aside class="leaderboard_sidebar">
                <h2 class="leaderboard_title">Leaderboard</h2>
                <p class="leaderboard_subtitle">Ranked by net worth</p>
                <div class="leaderboard_list">
                    {% for row in leaderboard %}
                    <div class="leaderboard_row {% if row.is_current %}current_user{% endif %}">
                        <span class="rank">{{ row.rank }}.</span>
                        <a href="{% url 'profile_user' row.username %}" class="username">{{ row.username }}</a>
                        <span class="net_worth">{{ row.net_worth }}</span>
                    </div>
                    {% empty %}
                    <div class="leaderboard_row">No users yet.</div>
                    {% endfor %}
                </div>
            </aside>
            <main class="home_main">
                <canvas id="chart"></canvas>
                <div class="row">
                    <p> Shares Held: <span id="holdings"></span></p>
                    <p> Liquid Money: <span id="liquid_money"></span></p>
                    <button onclick="buyStock()" id="buy_button"> Buy </button>
                    <button onclick="sellStock()" id="sell_button"> Sell </button>
                    <p> Total Holders: <span id="total_holders"></span></p>
                    <p> Total Shares: <span id="total_shares"></span></p>
                </div>
            </main>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="{% static 'alienstocksim/home.js' %}"></script>

    </body>
